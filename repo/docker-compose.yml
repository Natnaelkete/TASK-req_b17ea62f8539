services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wc_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - APP_NAME=${APP_NAME:-Workforce Compliance Platform}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY:-base64:QojhT2erTe8uJUXXTS1NgYriLk1t6Nl3B/mLVQYZ9ng=}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_URL=${APP_URL:-http://localhost:8000}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-workforce_compliance}
      - DB_USERNAME=${DB_USERNAME:-wc_user}
      - DB_PASSWORD=${DB_PASSWORD:-wc_password}
      - CACHE_DRIVER=file
      - QUEUE_CONNECTION=database
      - SESSION_DRIVER=database
      - FILESYSTEM_DISK=local
      - LOG_CHANNEL=stack
    volumes:
      - app_code:/var/www/public
      - app_storage:/var/www/storage
    networks:
      - wc_network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: wc_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - app_code:/var/www/public:ro
    networks:
      - wc_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: wc_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-workforce_compliance}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_USER: ${DB_USERNAME:-wc_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-wc_password}
    ports:
      - "${DB_EXTERNAL_PORT:-3308}:3306"
    volumes:
      - wc_dbdata:/var/lib/mysql
    networks:
      - wc_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: wc_queue
    restart: unless-stopped
    working_dir: /var/www
    entrypoint: []
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600"]
    environment:
      - APP_NAME=${APP_NAME:-Workforce Compliance Platform}
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY:-base64:QojhT2erTe8uJUXXTS1NgYriLk1t6Nl3B/mLVQYZ9ng=}
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-workforce_compliance}
      - DB_USERNAME=${DB_USERNAME:-wc_user}
      - DB_PASSWORD=${DB_PASSWORD:-wc_password}
      - QUEUE_CONNECTION=database
      - CACHE_DRIVER=file
    volumes:
      - app_storage:/var/www/storage
    networks:
      - wc_network
    depends_on:
      app:
        condition: service_started

networks:
  wc_network:
    driver: bridge

volumes:
  wc_dbdata:
    driver: local
  app_code:
    driver: local
  app_storage:
    driver: local
